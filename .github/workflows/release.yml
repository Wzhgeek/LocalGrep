# 推送 v* 标签后，在 macOS / Linux / Windows 上构建并发布到 GitHub Release。

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build and publish Tauri bundle
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          # 与 package.json / tauri.conf 中 version 一致；__VERSION__ 由 Action 替换
          tagName: "v__VERSION__"
          releaseName: "LocalGrep v__VERSION__"
          releaseBody: "本发行版由 GitHub Actions 自动构建。Assets 中可下载各平台安装包。"
          releaseDraft: false
          prerelease: false
          # 未配置 tauri.conf updater 时关闭，避免无意义产物
          uploadUpdaterJson: false
          args: ${{ matrix.args }}
